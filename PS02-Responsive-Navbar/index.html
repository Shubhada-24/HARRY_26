<!DOCTYPE html>
<html>
<head>
    <title>Responsive Navigation Bar</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        nav{
            background:#222;
            padding:15px;
        }

        .container{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        #toggle{
            display:none;
        }

        .hamburger{
            display:none;
            color:white;
            font-size:28px;
            cursor:pointer;
        }

        ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        ul li a{
            text-decoration:none;
            color:white;
            padding:8px 12px;
            border-radius:5px;
        }

        ul li a:hover{
            background:#555;
        }

        .active{
            background:blue;
        }


        @media(max-width:600px){

            .container{
                flex-wrap:wrap;
            }

            .hamburger{
                display:block;
            }

            ul{
                display:none;
                width:100%;
                flex-direction:column;
                margin-top:15px;
            }

            #toggle:checked ~ ul{
                display:flex;
            }
        }

    </style>

</head>
<body>


    <nav>

        <div class="container">

            <div class="logo">
                MySite
            </div>


            <label for="toggle" class="hamburger">
                ☰
            </label>


            <input type="checkbox" id="toggle">


            <ul>

                <li><a href="#" class="active">Home</a></li>

                <li><a href="#">About</a></li>

                <li><a href="#">Services</a></li>

                <li><a href="#">Gallery</a></li>

                <li><a href="#">Contact</a></li>

            </ul>

        </div>

    </nav>


</body>
</html>
