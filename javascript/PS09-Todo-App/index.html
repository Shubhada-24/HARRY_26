<!DOCTYPE html>
<html>
<head>
    <title>To Do App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f2f2f2;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;
        }

        .box{

            width:500px;

            background:white;

            padding:20px;

            border-radius:10px;

            box-shadow:0 5px 15px rgba(0,0,0,0.2);

        }

        input{

            width:70%;

            padding:10px;

        }

        button{

            padding:10px;

            cursor:pointer;

            margin-left:5px;

        }

        li{

            margin-top:15px;

            list-style:none;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:10px;

            background:#eee;

            border-radius:5px;

        }

        .done{

            text-decoration:line-through;

            color:gray;

        }

        .filters{

            margin-top:15px;

        }

    </style>

</head>
<body>



<div class="box">

    <h2>To Do List</h2>


    <br>


    <input
           id="taskInput"
           placeholder="Enter task">


    <button onclick="addTask()">
        Add
    </button>



    <div class="filters">

        <button onclick="showTasks('all')">
            All
        </button>


        <button onclick="showTasks('active')">
            Active
        </button>


        <button onclick="showTasks('completed')">
            Completed
        </button>

    </div>



    <ul id="taskList"></ul>


</div>



<script>


    let tasks =

    JSON.parse(

    localStorage.getItem("tasks")

    )

    ||

    [];



    function saveTasks(){

        localStorage.setItem(

        "tasks",

        JSON.stringify(tasks)

        );

    }



    function addTask(){

        let input =

        document.getElementById("taskInput");



        if(input.value == ""){

            return;

        }



        tasks.push({

            text:input.value,

            done:false

        });



        input.value = "";



        saveTasks();



        showTasks("all");

    }




    function showTasks(type){

        let list =

        document.getElementById("taskList");



        list.innerHTML = "";



        tasks.forEach(

        function(task,index){

            if(

                type=="active"

                &&

                task.done

            ){

                return;

            }



            if(

                type=="completed"

                &&

                !task.done

            ){

                return;

            }



            let li =

            document.createElement("li");



            li.innerHTML =

            `

            <span

            class="${
            task.done
            ?
            'done'
            :
            ''
            }"

            onclick="toggleTask(${index})">

            ${task.text}

            </span>



            <button

            onclick="deleteTask(${index})">

            Delete

            </button>

            `;



            list.appendChild(li);

        });

    }




    function toggleTask(index){

        tasks[index].done =

        !tasks[index].done;



        saveTasks();



        showTasks("all");

    }




    function deleteTask(index){

        tasks.splice(index,1);



        saveTasks();



        showTasks("all");

    }



    showTasks("all");


</script>



</body>
</html>
